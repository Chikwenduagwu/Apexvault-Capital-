<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Invest — Apexvault</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="css/main.css"/>
<style>
* { font-family: 'DM Sans', sans-serif; }

body {
  background: #F4F0E4;
  padding-bottom: 80px;
  min-height: 100vh;
}

/* ── PAGE HEADER ───────────────────── */
.inv-page-header {
  background: linear-gradient(160deg, #283618 0%, #3a5020 55%, #606C38 100%);
  padding: 52px 20px 28px;
  position: relative; overflow: hidden;
}
.inv-page-header::before {
  content:''; position:absolute; top:-50px; right:-50px;
  width:200px; height:200px; border-radius:50%;
  background:rgba(221,161,94,.1); pointer-events:none;
}
.inv-header-top {
  display:flex; align-items:center; gap:14px;
  position:relative; z-index:1;
}
.inv-back-btn {
  width:38px; height:38px; border-radius:8px;
  background:rgba(254,250,224,.12);
  border:1px solid rgba(254,250,224,.2);
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; transition:background .2s;
  flex-shrink:0;
}
.inv-back-btn:hover { background:rgba(254,250,224,.22); }
.inv-back-btn svg { stroke:rgba(254,250,224,.8); }
.inv-header-text {}
.inv-page-title {
  font-size:20px; font-weight:700;
  color:#FEFAE0; line-height:1.1;
}
.inv-page-sub {
  font-size:12px; color:rgba(254,250,224,.5);
  margin-top:2px;
}

/* ── BALANCE CHIP ──────────────────── */
.inv-balance-chip {
  display:inline-flex; align-items:center; gap:8px;
  background:rgba(254,250,224,.1);
  border:1px solid rgba(254,250,224,.18);
  border-radius:8px; padding:8px 14px;
  margin-top:16px; position:relative; z-index:1;
}
.inv-balance-chip-label {
  font-size:11px; color:rgba(254,250,224,.5); font-weight:500;
}
.inv-balance-chip-val {
  font-size:15px; font-weight:700;
  color:#DDA15E;
  font-family:'DM Mono',monospace;
}

/* ── PLANS CONTAINER ───────────────── */
.plans-container {
  padding:20px 16px;
  display:flex; flex-direction:column; gap:14px;
}

/* ── PLAN CARD — Modern squared ────── */
.plan-card-v3 {
  background:#FEFAE0;
  border:1.5px solid #D4C9A8;
  border-radius:6px;         /* squared, minimal radius */
  overflow:hidden;
  cursor:pointer;
  transition:border-color .2s, box-shadow .2s, transform .2s;
  position:relative;
}
.plan-card-v3:hover {
  border-color:#606C38;
  box-shadow:0 6px 28px rgba(96,108,56,.14);
  transform:translateY(-2px);
}
.plan-card-v3.featured {
  border-color:#606C38;
  border-width:2px;
  box-shadow:0 4px 20px rgba(96,108,56,.16);
}

/* Left accent bar */
.plan-card-v3::before {
  content:'';
  position:absolute; left:0; top:0; bottom:0;
  width:4px;
  background:#D4C9A8;
  transition:background .2s;
}
.plan-card-v3:hover::before { background:#606C38; }
.plan-card-v3.featured::before { background:#DDA15E; }
.plan-card-v3.tier-2::before { background:#606C38; }
.plan-card-v3.tier-3::before { background:#283618; }

/* Popular badge */
.plan-popular-tag {
  position:absolute; top:0; right:0;
  background:#DDA15E; color:#283618;
  font-size:9px; font-weight:800;
  letter-spacing:1px; text-transform:uppercase;
  padding:5px 12px;
  border-bottom-left-radius:6px;
}

/* Plan top row */
.plan-top {
  display:flex; align-items:flex-start;
  justify-content:space-between;
  padding:18px 18px 12px 22px;
  border-bottom:1px solid #EDE8D0;
}
.plan-top-left {}
.plan-name {
  font-size:16px; font-weight:700;
  color:#283618; letter-spacing:-.2px;
  margin-bottom:3px;
}
.plan-tagline {
  font-size:12px; color:#9a9278;
  font-weight:400; line-height:1.4;
  max-width:200px;
}
.plan-roi-wrap {
  text-align:right; flex-shrink:0;
}
.plan-roi-number {
  font-size:32px; font-weight:700;
  color:#606C38; line-height:1;
  font-family:'DM Mono',monospace;
  letter-spacing:-1px;
}
.plan-roi-label {
  font-size:10px; color:#9a9278;
  font-weight:600; margin-top:2px;
  letter-spacing:.3px;
}

/* Plan stats grid */
.plan-stats {
  display:grid; grid-template-columns:repeat(3,1fr);
  border-bottom:1px solid #EDE8D0;
}
.plan-stat {
  padding:12px 0;
  text-align:center;
  border-right:1px solid #EDE8D0;
}
.plan-stat:last-child { border-right:none; }
.plan-stat-val {
  font-size:14px; font-weight:700;
  color:#283618; font-family:'DM Mono',monospace;
  letter-spacing:-.3px;
}
.plan-stat-label {
  font-size:9px; font-weight:600;
  color:#b0a98c; letter-spacing:.5px;
  text-transform:uppercase; margin-top:3px;
}

/* Plan feature list */
.plan-features {
  padding:13px 22px;
  display:flex; flex-direction:column; gap:7px;
  border-bottom:1px solid #EDE8D0;
}
.plan-feature-row {
  display:flex; align-items:center; gap:8px;
  font-size:12px; color:#5c5640;
}
.plan-feature-row svg { stroke:#606C38; flex-shrink:0; }

/* Plan CTA row */
.plan-cta {
  display:flex; align-items:center;
  justify-content:space-between;
  padding:14px 18px 14px 22px;
}
.plan-range-text {
  font-size:12px; color:#9a9278;
  font-weight:500;
}
.plan-range-text strong {
  color:#283618; font-weight:700;
}
.plan-cta-btn {
  padding:10px 20px;
  border:none; border-radius:6px;
  font-size:13px; font-weight:700;
  font-family:'DM Sans',sans-serif;
  cursor:pointer; transition:all .2s;
  display:flex; align-items:center; gap:6px;
}
.plan-cta-btn.default {
  background:#EDE8D0; color:#606C38;
  border:1.5px solid #D4C9A8;
}
.plan-cta-btn.default:hover {
  background:#606C38; color:#FEFAE0;
  border-color:#606C38;
}
.plan-cta-btn.highlight {
  background:#606C38; color:#FEFAE0;
}
.plan-cta-btn.highlight:hover {
  background:#283618;
}
.plan-cta-btn.premium {
  background:#283618; color:#DDA15E;
}
.plan-cta-btn.premium:hover {
  background:#1a2410;
}

/* ── INVEST MODAL ──────────────────── */
.d-modal-overlay {
  position:fixed; inset:0;
  background:rgba(40,54,24,.45);
  z-index:500;
  display:flex; align-items:flex-end;
  backdrop-filter:blur(4px);
  animation:fadeIn .22s ease;
}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.d-modal-sheet {
  width:100%; background:#FEFAE0;
  border-radius:16px 16px 0 0;
  padding:0 20px 36px;
  animation:slideUp .28s ease;
  max-height:90vh; overflow-y:auto;
}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.d-modal-handle {
  width:40px; height:4px;
  background:#D4C9A8; border-radius:99px;
  margin:14px auto 20px;
}
.d-modal-title {
  font-size:17px; font-weight:700;
  color:#283618; margin-bottom:6px;
}
.d-modal-sub {
  font-size:12px; color:#9a9278;
  margin-bottom:18px;
}

/* Calculator */
.calc-box {
  background:#F0EBD4; border-radius:8px;
  border:1px solid #D4C9A8; padding:4px 0;
  margin-bottom:16px;
}
.calc-row {
  display:flex; justify-content:space-between;
  align-items:center; padding:11px 16px;
  border-bottom:1px solid #E8E2CA;
  font-size:13px;
}
.calc-row:last-child { border-bottom:none; }
.calc-label { color:#9a9278; font-weight:400; }
.calc-val { font-weight:700; color:#283618; font-family:'DM Mono',monospace; }
.calc-val.big { color:#606C38; font-size:18px; }

.pf-label {
  display:block; font-size:11px; font-weight:600;
  color:#9a9278; letter-spacing:.5px;
  text-transform:uppercase; margin-bottom:6px;
}
.pf-input {
  width:100%; padding:13px 15px;
  background:#F0EBD4; border:1.5px solid #D4C9A8;
  border-radius:8px; font-size:15px; color:#283618;
  outline:none; font-family:'DM Sans',sans-serif;
  transition:border-color .18s; margin-bottom:14px;
}
.pf-input:focus { border-color:#606C38; }
.pf-input::placeholder { color:#b0a98c; }
.pf-btn {
  width:100%; padding:15px;
  background:#606C38; color:#FEFAE0;
  border:none; border-radius:8px;
  font-size:15px; font-weight:700;
  font-family:'DM Sans',sans-serif;
  cursor:pointer; transition:background .2s;
}
.pf-btn:hover { background:#283618; }
.pf-btn:disabled { opacity:.55; cursor:not-allowed; }

/* ── BOTTOM NAV ────────────────────── */
.bottom-nav {
  position:fixed; bottom:0; left:0; right:0;
  height:68px; background:#FEFAE0;
  border-top:1px solid rgba(212,201,168,.5);
  display:flex; align-items:center; justify-content:space-around;
  z-index:100; box-shadow:0 -4px 20px rgba(40,54,24,.08);
}
.bottom-nav a {
  display:flex; flex-direction:column; align-items:center; gap:3px;
  padding:8px 10px; border-radius:10px;
  color:#b0a98c; font-size:10px; font-weight:600;
  letter-spacing:.3px; text-decoration:none;
  transition:color .18s; min-width:52px;
}
.bottom-nav a.active, .bottom-nav a:hover { color:#606C38; }
.bottom-nav a.active svg, .bottom-nav a:hover svg { stroke:#606C38; }
.bottom-nav svg { stroke:currentColor; transition:stroke .18s; }
</style>
</head>
<body>

<!-- PAGE HEADER -->
<div class="inv-page-header">
  <div class="inv-header-top">
    <a href="dashboard.html" class="inv-back-btn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
    </a>
    <div class="inv-header-text">
      <div class="inv-page-title">Investment Plans</div>
      <div class="inv-page-sub">Daily returns claimed every 24 hours</div>
    </div>
  </div>
  <div class="inv-balance-chip">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="rgba(254,250,224,.6)" stroke-width="2.5"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v2"/></svg>
    <span class="inv-balance-chip-label">Available Balance</span>
    <span class="inv-balance-chip-val" id="user-balance">$0.00</span>
  </div>
</div>

<!-- PLANS LIST -->
<div class="plans-container" id="plans-container">
  <!-- Skeletons -->
  <div style="height:260px;background:linear-gradient(90deg,#F0EBD4 25%,#E8E2C8 50%,#F0EBD4 75%);background-size:200% 100%;border-radius:6px;animation:shimmer 1.4s infinite;"></div>
  <div style="height:260px;background:linear-gradient(90deg,#F0EBD4 25%,#E8E2C8 50%,#F0EBD4 75%);background-size:200% 100%;border-radius:6px;animation:shimmer 1.4s infinite;animation-delay:.15s"></div>
  <style>@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}</style>
</div>

<!-- INVEST MODAL -->
<div class="d-modal-overlay" id="invest-modal" style="display:none;" onclick="if(event.target===this) closeModal()">
  <div class="d-modal-sheet">
    <div class="d-modal-handle"></div>
    <div class="d-modal-title" id="modal-plan-name">Invest</div>
    <div class="d-modal-sub" id="modal-plan-info"></div>

    <label class="pf-label">Amount (USD)</label>
    <input class="pf-input" type="number" id="invest-amount" placeholder="Enter amount" oninput="updateCalc()"/>

    <div class="calc-box">
      <div class="calc-row">
        <span class="calc-label">Daily Return</span>
        <span class="calc-val" id="m-daily">$0.00</span>
      </div>
      <div class="calc-row">
        <span class="calc-label">Total Return (full term)</span>
        <span class="calc-val big" id="m-total">$0.00</span>
      </div>
      <div class="calc-row">
        <span class="calc-label">Capital at End</span>
        <span class="calc-val" id="m-capital">$0.00</span>
      </div>
      <div class="calc-row">
        <span class="calc-label">Your Balance</span>
        <span class="calc-val" id="m-balance">$0.00</span>
      </div>
    </div>

    <button class="pf-btn" id="confirm-invest-btn" onclick="confirmInvest()">
      Confirm Investment
    </button>
    <p style="font-size:11px;color:#9a9278;text-align:center;margin-top:10px;">
      Returns are claimable every 24 hours from the Mine page.
    </p>
  </div>
</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <a href="invest.html" class="active">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>Invest
  </a>
  <a href="mine.html">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>Mine
  </a>
  <a href="dashboard.html">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>Home
  </a>
  <a href="referral.html">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>Referral
  </a>
  <a href="profile.html">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>Profile
  </a>
</nav>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-config.js"></script>
<script src="js/toast.js"></script>
<script>
let selectedPlan = null, currentUser = null, userProfile = null;

// Tier styles: [left-bar-class, cta-btn-class, featured?]
const TIER_STYLES = [
  { bar:'',       cta:'default',   feat:false },
  { bar:'tier-2', cta:'highlight', feat:true  },
  { bar:'tier-3', cta:'premium',   feat:false },
];

// Feature bullets per plan tier
const TIER_FEATURES = [
  [
    'Daily profit claimable every 24 hours',
    'Withdraw anytime after plan ends',
    'Capital returned at maturity',
  ],
  [
    'Accelerated daily returns',
    'Priority withdrawal processing',
    'Capital returned + compounded profit',
    'Eligible for referral bonus multiplier',
  ],
  [
    'Maximum daily yield available',
    'Dedicated account manager',
    'Express withdrawal within 12 hours',
    'Profit re-investment auto-compound option',
    'Capital fully returned at maturity',
  ],
];

const CHECK_SVG = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>`;

(async () => {
  currentUser = await requireAuth(); if (!currentUser) return;
  userProfile = await getProfile(currentUser.id);
  document.getElementById('user-balance').textContent = formatMoney(userProfile.balance);
  document.getElementById('m-balance').textContent    = formatMoney(userProfile.balance);

  const { data: plans, error } = await sb.from('plans')
    .select('*').eq('is_active', true).order('min_amount');

  if (error || !plans?.length) {
    document.getElementById('plans-container').innerHTML =
      '<p style="text-align:center;padding:40px 0;color:#9a9278;font-size:14px;">No active investment plans available.</p>';
    return;
  }

  const featIdx = Math.floor(plans.length / 2);

  document.getElementById('plans-container').innerHTML = plans.map((p, i) => {
    const tier   = TIER_STYLES[i % TIER_STYLES.length];
    const isFeat = i === featIdx;
    const feats  = TIER_FEATURES[i % TIER_FEATURES.length];
    const minEst = formatMoney(p.min_amount * p.daily_roi_percent / 100);
    const totalEst = formatMoney(p.min_amount * p.daily_roi_percent / 100 * p.duration_days);

    return `
    <div class="plan-card-v3 ${isFeat ? 'featured' : ''} ${tier.bar}"
         onclick='openModal(${JSON.stringify(p).replace(/"/g,"&quot;")})'>

      ${isFeat ? '<div class="plan-popular-tag">Most Popular</div>' : ''}

      <div class="plan-top">
        <div class="plan-top-left">
          <div class="plan-name">${p.name}</div>
          <div class="plan-tagline">${p.description || 'Earn daily returns on your capital.'}</div>
        </div>
        <div class="plan-roi-wrap">
          <div class="plan-roi-number">${p.daily_roi_percent}%</div>
          <div class="plan-roi-label">per day</div>
        </div>
      </div>

      <div class="plan-stats">
        <div class="plan-stat">
          <div class="plan-stat-val">$${Number(p.min_amount).toLocaleString()}</div>
          <div class="plan-stat-label">Min</div>
        </div>
        <div class="plan-stat">
          <div class="plan-stat-val">${p.duration_days}d</div>
          <div class="plan-stat-label">Term</div>
        </div>
        <div class="plan-stat">
          <div class="plan-stat-val">$${Number(p.max_amount).toLocaleString()}</div>
          <div class="plan-stat-label">Max</div>
        </div>
      </div>

      <div class="plan-features">
        ${feats.map(f => `
          <div class="plan-feature-row">${CHECK_SVG}${f}</div>
        `).join('')}
      </div>

      <div class="plan-cta">
        <div class="plan-range-text">
          From <strong>${minEst}/day</strong> · <strong>${totalEst}</strong> total
        </div>
        <button class="plan-cta-btn ${tier.cta}">
          Invest
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </button>
      </div>
    </div>`;
  }).join('');
})();

function openModal(plan) {
  selectedPlan = plan;
  document.getElementById('invest-modal').style.display = 'flex';
  document.getElementById('modal-plan-name').textContent = plan.name + ' Plan';
  document.getElementById('modal-plan-info').textContent =
    `${plan.daily_roi_percent}% daily · ${plan.duration_days}-day term · $${Number(plan.min_amount).toLocaleString()} – $${Number(plan.max_amount).toLocaleString()}`;
  document.getElementById('invest-amount').value = '';
  document.getElementById('m-balance').textContent = formatMoney(userProfile?.balance || 0);
  document.getElementById('m-daily').textContent   = '$0.00';
  document.getElementById('m-total').textContent   = '$0.00';
  document.getElementById('m-capital').textContent = '$0.00';
}
function closeModal() { document.getElementById('invest-modal').style.display = 'none'; }

function updateCalc() {
  if (!selectedPlan) return;
  const amt = parseFloat(document.getElementById('invest-amount').value) || 0;
  const daily   = amt * selectedPlan.daily_roi_percent / 100;
  const total   = daily * selectedPlan.duration_days;
  const capital = amt + total;
  document.getElementById('m-daily').textContent   = formatMoney(daily);
  document.getElementById('m-total').textContent   = formatMoney(total);
  document.getElementById('m-capital').textContent = formatMoney(capital);
}

async function confirmInvest() {
  const amount = parseFloat(document.getElementById('invest-amount').value);
  if (!amount || isNaN(amount))           { Toast.show('Enter a valid amount.','warning'); return; }
  if (amount < selectedPlan.min_amount)   { Toast.show(`Minimum is $${selectedPlan.min_amount}.`,'warning'); return; }
  if (amount > selectedPlan.max_amount)   { Toast.show(`Maximum is $${Number(selectedPlan.max_amount).toLocaleString()}.`,'warning'); return; }
  if (amount > (userProfile?.balance||0)) { Toast.show('Insufficient balance. Please deposit first.','error'); return; }

  const btn = document.getElementById('confirm-invest-btn');
  btn.disabled = true; btn.textContent = 'Processing…';

  const expiresAt = new Date();
  expiresAt.setDate(expiresAt.getDate() + selectedPlan.duration_days);

  const { error: invErr } = await sb.from('investments').insert({
    user_id:           currentUser.id,
    plan_id:           selectedPlan.id,
    amount,
    daily_roi_percent: selectedPlan.daily_roi_percent,
    expires_at:        expiresAt.toISOString()
  });
  if (invErr) { Toast.show(invErr.message,'error'); btn.disabled=false; btn.textContent='Confirm Investment'; return; }

  const { error: balErr } = await sb.from('profiles').update({
    balance:         userProfile.balance - amount,
    total_deposited: (userProfile.total_deposited||0) + amount
  }).eq('id', currentUser.id);
  if (balErr) console.warn('Balance deduction warning:', balErr.message);

  Toast.show(`${formatMoney(amount)} invested in ${selectedPlan.name}!`, 'success');
  closeModal();
  setTimeout(() => window.location.href = 'dashboard.html', 1200);
}
</script>
</body>
</html>
