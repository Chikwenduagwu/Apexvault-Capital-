<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Admin Login — EarthROI</title>
<link rel="stylesheet" href="css/main.css"/>
<style>
  body {
    padding-bottom:0;
    background:var(--pine);
    display:flex; align-items:center; justify-content:center; min-height:100vh;
  }
  .wrap { width:100%; max-width:380px; padding:24px 20px; }
  .auth-card {
    background:var(--card-bg);
    border:1px solid var(--border);
    border-radius:var(--radius);
    padding:32px;
    box-shadow:0 20px 60px rgba(0,0,0,0.35);
  }
  .admin-badge {
    display:inline-flex; align-items:center; gap:7px;
    background:var(--pine); color:var(--text-white);
    font-size:10px; font-weight:800;
    letter-spacing:1.2px; text-transform:uppercase;
    padding:5px 12px; border-radius:99px;
    font-family:'Montserrat',sans-serif;
    margin-bottom:20px;
  }
  .admin-badge svg { stroke:var(--earth); }
  .login-title { font-size:22px; color:var(--pine); margin-bottom:5px; }
  .login-sub   { font-size:13px; color:var(--text-muted); margin-bottom:26px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="auth-card">
    <div class="admin-badge">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
      Admin Access
    </div>
    <h1 class="login-title">Control Panel</h1>
    <p class="login-sub">Restricted area. Admin credentials required.</p>

    <form id="admin-login-form" autocomplete="off">
      <div class="form-group">
        <label class="form-label" for="email">Admin Email</label>
        <input class="form-input" type="email" id="email" name="email" placeholder="admin@earthroi.com" required/>
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input class="form-input" type="password" id="password" name="password" placeholder="••••••••" required/>
      </div>
      <button type="submit" class="btn btn-full" style="background:var(--pine);color:var(--text-white);margin-top:8px;">
        Admin Sign In
      </button>
    </form>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-config.js"></script>
<script src="js/toast.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
