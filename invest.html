<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Invest — EarthROI</title>
<link rel="stylesheet" href="css/main.css"/>
<link rel="stylesheet" href="css/dashboard.css"/>
<style>
/* ── Plan cards grid ── */
.plans-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 16px;
}

/* Upgraded plan card */
.plan-card-v2 {
  background: var(--card-bg);
  border: 1.5px solid var(--border);
  border-radius: 20px;
  padding: 0;
  overflow: hidden;
  cursor: pointer;
  transition: transform 0.22s ease, box-shadow 0.22s ease, border-color 0.22s ease;
  position: relative;
}
.plan-card-v2:hover {
  transform: translateY(-3px);
  box-shadow: 0 12px 40px rgba(96,108,56,0.18);
  border-color: var(--primary);
}
.plan-card-v2.featured {
  border-color: var(--primary);
  box-shadow: 0 6px 30px rgba(96,108,56,0.2);
}

/* Coloured top bar per plan */
.plan-header {
  padding: 20px 22px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.plan-header-olive  { background: linear-gradient(135deg,var(--pine) 0%,var(--primary) 100%); }
.plan-header-earth  { background: linear-gradient(135deg,#7a5800 0%,var(--earth) 100%); }
.plan-header-pine   { background: linear-gradient(135deg,#1a3a0a 0%,#3a5c1e 100%); }

.plan-header-name {
  font-family: 'Montserrat', sans-serif;
  font-weight: 800; font-size: 18px;
  color: var(--text-white); letter-spacing: 0.5px;
}
.plan-header-roi {
  font-family: 'Montserrat', sans-serif;
  font-weight: 800; font-size: 26px;
  color: var(--earth-lt);
  display: flex; align-items: baseline; gap: 3px;
}
.plan-header-roi small {
  font-size: 12px; font-weight: 600;
  color: rgba(254,250,224,0.7);
}
.plan-featured-tag {
  position: absolute; top: 0; right: 20px;
  background: var(--earth);
  color: var(--pine);
  font-family: 'Montserrat', sans-serif;
  font-size: 9px; font-weight: 800;
  letter-spacing: 0.8px; text-transform: uppercase;
  padding: 4px 10px;
  border-radius: 0 0 8px 8px;
}

.plan-body { padding: 18px 22px 20px; }

.plan-stats-row {
  display: grid;
  grid-template-columns: repeat(3,1fr);
  gap: 1px;
  background: var(--border);
  border-radius: 10px;
  overflow: hidden;
  margin-bottom: 16px;
}
.plan-stat {
  background: var(--earth-lt);
  padding: 12px 10px;
  text-align: center;
}
.plan-stat-val {
  font-family: 'Montserrat', sans-serif;
  font-weight: 700; font-size: 14px;
  color: var(--pine); line-height: 1;
}
.plan-stat-label {
  font-size: 10px; color: var(--text-muted);
  font-weight: 600; margin-top: 4px;
  letter-spacing: 0.3px; text-transform: uppercase;
}

.plan-desc {
  font-size: 13px; color: var(--text-muted);
  line-height: 1.6; margin-bottom: 16px;
}

.plan-invest-btn {
  width: 100%; padding: 13px;
  background: var(--primary); color: var(--text-white);
  border: none; border-radius: 10px;
  font-family: 'Montserrat', sans-serif;
  font-size: 14px; font-weight: 700;
  cursor: pointer;
  transition: background 0.2s ease;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.plan-invest-btn:hover { background: var(--primary-hv); }
.plan-card-v2.featured .plan-invest-btn {
  background: var(--earth);
  color: var(--pine);
}
.plan-card-v2.featured .plan-invest-btn:hover { background: var(--earth-lt); }

/* Modal calculator */
.calc-row {
  display: flex; justify-content: space-between;
  align-items: center;
  padding: 10px 0;
  border-bottom: 1px solid var(--border);
  font-size: 14px;
}
.calc-row:last-child { border-bottom: none; }
.calc-label { color: var(--text-muted); }
.calc-val { font-family: 'Montserrat', sans-serif; font-weight: 700; color: var(--pine); }
.calc-val.highlight { color: var(--primary); font-size: 18px; }
</style>
</head>
<body>
<main class="page-content">
  <div class="page-header">
    <a href="dashboard.html" class="back-btn">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
    </a>
    <h1>Investment Plans</h1>
  </div>
  <p class="text-muted" style="margin-bottom:24px;">Choose a plan · returns claimable every 24h on the Mine page.</p>

  <div id="plans-grid" class="plans-grid">
    <!-- skeleton -->
    <div style="height:220px;background:linear-gradient(90deg,#F0EBD4 25%,#E8E2C8 50%,#F0EBD4 75%);background-size:200% 100%;border-radius:20px;animation:shimmer 1.4s infinite;"></div>
    <div style="height:220px;background:linear-gradient(90deg,#F0EBD4 25%,#E8E2C8 50%,#F0EBD4 75%);background-size:200% 100%;border-radius:20px;animation:shimmer 1.4s infinite;transition-delay:.1s"></div>
    <style>@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}</style>
  </div>
</main>

<!-- Invest modal -->
<div class="modal-overlay" id="invest-modal" style="display:none;">
  <div class="modal">
    <div class="modal-title" id="modal-plan-name">Invest</div>
    <p style="font-size:13px;color:var(--text-muted);margin-bottom:16px;" id="modal-plan-info"></p>

    <div class="form-group">
      <label class="form-label">Amount (USD)</label>
      <input class="form-input" type="number" id="invest-amount" placeholder="Enter amount"/>
    </div>

    <!-- Live calculator -->
    <div style="background:var(--earth-lt);border-radius:12px;padding:4px 14px;margin-bottom:16px;">
      <div class="calc-row"><span class="calc-label">Daily Return</span><span class="calc-val" id="m-daily">$0.00</span></div>
      <div class="calc-row"><span class="calc-label">Total (plan duration)</span><span class="calc-val highlight" id="m-total">$0.00</span></div>
      <div class="calc-row"><span class="calc-label">Your Balance</span><span class="calc-val" id="m-balance">$0.00</span></div>
    </div>

    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" id="confirm-invest-btn" onclick="confirmInvest()">Confirm Investment</button>
    </div>
  </div>
</div>

<nav class="bottom-nav">
  <a href="invest.html" class="active">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>Invest
  </a>
  <a href="mine.html">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>Mine
  </a>
  <a href="dashboard.html">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>Home
  </a>
  <a href="referral.html">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>Referral
  </a>
  <a href="profile.html">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>Profile
  </a>
</nav>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="js/supabase-config.js"></script>
<script src="js/toast.js"></script>
<script src="js/ui-effects.js"></script>
<script>
let selectedPlan = null, currentUser = null, userProfile = null;

const HEADER_CLASSES = ['plan-header-olive','plan-header-earth','plan-header-pine'];

(async () => {
  currentUser = await requireAuth(); if (!currentUser) return;
  userProfile = await getProfile(currentUser.id);

  const { data: plans, error } = await sb.from('plans').select('*').eq('is_active',true).order('min_amount');
  if (error || !plans?.length) {
    document.getElementById('plans-grid').innerHTML = '<p class="text-muted text-center" style="padding:32px 0;">No active investment plans available.</p>';
    return;
  }

  /* pick the middle plan as featured */
  const featIdx = Math.floor(plans.length / 2);

  document.getElementById('plans-grid').innerHTML = plans.map((p, i) => {
    const hClass = HEADER_CLASSES[i % HEADER_CLASSES.length];
    const isFeat = i === featIdx;
    const daily   = formatMoney(p.min_amount * p.daily_roi_percent / 100);
    const totalAt = formatMoney(p.min_amount * p.daily_roi_percent / 100 * p.duration_days);
    return `
    <div class="plan-card-v2 ${isFeat ? 'featured' : ''}" onclick="openModal(${JSON.stringify(p).replace(/"/g,'&quot;')})">
      ${isFeat ? '<div class="plan-featured-tag">Most Popular</div>' : ''}
      <div class="plan-header ${hClass}">
        <div class="plan-header-name">${p.name}</div>
        <div class="plan-header-roi">${p.daily_roi_percent}<small>% / day</small></div>
      </div>
      <div class="plan-body">
        <div class="plan-stats-row">
          <div class="plan-stat">
            <div class="plan-stat-val">$${Number(p.min_amount).toLocaleString()}</div>
            <div class="plan-stat-label">Min</div>
          </div>
          <div class="plan-stat">
            <div class="plan-stat-val">${p.duration_days}d</div>
            <div class="plan-stat-label">Term</div>
          </div>
          <div class="plan-stat">
            <div class="plan-stat-val">$${Number(p.max_amount).toLocaleString()}</div>
            <div class="plan-stat-label">Max</div>
          </div>
        </div>
        <p class="plan-desc">${p.description || 'Earn daily returns on your capital with this plan.'}</p>
        <button class="plan-invest-btn">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Invest Now
        </button>
      </div>
    </div>`;
  }).join('');
})();

function openModal(plan) {
  selectedPlan = plan;
  document.getElementById('invest-modal').style.display = 'flex';
  document.getElementById('modal-plan-name').textContent = `Invest — ${plan.name}`;
  document.getElementById('modal-plan-info').textContent =
    `${plan.daily_roi_percent}% daily · ${plan.duration_days}-day term · $${plan.min_amount}–$${Number(plan.max_amount).toLocaleString()}`;
  document.getElementById('invest-amount').value = '';
  document.getElementById('m-daily').textContent = '$0.00';
  document.getElementById('m-total').textContent = '$0.00';
  document.getElementById('m-balance').textContent = formatMoney(userProfile?.balance || 0);

  document.getElementById('invest-amount').oninput = e => {
    const amt = parseFloat(e.target.value) || 0;
    document.getElementById('m-daily').textContent = formatMoney(amt * plan.daily_roi_percent / 100);
    document.getElementById('m-total').textContent = formatMoney(amt * plan.daily_roi_percent / 100 * plan.duration_days);
  };
}
function closeModal() { document.getElementById('invest-modal').style.display = 'none'; }

async function confirmInvest() {
  const amount = parseFloat(document.getElementById('invest-amount').value);
  if (!amount || isNaN(amount))         { Toast.show('Enter a valid amount.','warning'); return; }
  if (amount < selectedPlan.min_amount) { Toast.show(`Minimum is $${selectedPlan.min_amount}.`,'warning'); return; }
  if (amount > selectedPlan.max_amount) { Toast.show(`Maximum is $${selectedPlan.max_amount}.`,'warning'); return; }
  if (amount > (userProfile?.balance||0)){ Toast.show('Insufficient balance. Please deposit first.','error'); return; }

  const btn = document.getElementById('confirm-invest-btn');
  setLoading(btn, true, 'Processing…');

  const expiresAt = new Date();
  expiresAt.setDate(expiresAt.getDate() + selectedPlan.duration_days);

  const { error } = await sb.from('investments').insert({
    user_id: currentUser.id,
    plan_id: selectedPlan.id,
    amount,
    daily_roi_percent: selectedPlan.daily_roi_percent,
    expires_at: expiresAt.toISOString()
  });
  if (error) { Toast.show(error.message,'error'); setLoading(btn,false); return; }

  await sb.from('profiles').update({
    balance: userProfile.balance - amount,
    total_deposited: (userProfile.total_deposited||0) + amount
  }).eq('id', currentUser.id);

  Toast.show(`${formatMoney(amount)} invested in ${selectedPlan.name}!`, 'success');
  closeModal();
  setTimeout(() => window.location.href = 'dashboard.html', 1200);
}

document.getElementById('invest-modal').addEventListener('click', e => {
  if (e.target === document.getElementById('invest-modal')) closeModal();
});
</script>
</body>
</html>
