<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Invest — EarthROI</title>
<link rel="stylesheet" href="css/main.css"/>
<link rel="stylesheet" href="css/dashboard.css"/>
<style>
  .plans-list { display:flex; flex-direction:column; gap:16px; }
</style>
</head>
<body>
<main class="page-content">
  <div class="page-header">
    <a href="dashboard.html" class="back-btn">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
    </a>
    <h1>Investment Plans</h1>
  </div>
  <p class="text-muted" style="margin-bottom:24px;">All returns are claimable every 24 hours from your Mine page.</p>
  <div id="plans-list" class="plans-list">
    <div class="text-muted text-center" style="padding:24px;">Loading plans…</div>
  </div>
</main>

<div class="modal-overlay" id="invest-modal" style="display:none;">
  <div class="modal">
    <div class="modal-title" id="modal-plan-name">Invest</div>
    <p class="text-muted" id="modal-plan-info" style="margin-bottom:18px;font-size:13px;"></p>
    <div class="form-group">
      <label class="form-label">Investment Amount (USD)</label>
      <input class="form-input" type="number" id="invest-amount" placeholder="Enter amount" min="0"/>
    </div>
    <div class="info-box" style="margin-bottom:4px;">
      <div style="display:flex;justify-content:space-between;margin-bottom:6px;">
        <span>Daily Return</span><strong id="modal-daily-return">$0.00</strong>
      </div>
      <div style="display:flex;justify-content:space-between;">
        <span>Total (30 days)</span><strong id="modal-total-return">$0.00</strong>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" id="confirm-invest-btn" onclick="confirmInvest()">Confirm</button>
    </div>
  </div>
</div>

<nav class="bottom-nav">
  <a href="invest.html" class="active">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>Invest
  </a>
  <a href="mine.html">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>Mine
  </a>
  <a href="dashboard.html">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>Home
  </a>
  <a href="referral.html">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>Referral
  </a>
  <a href="profile.html">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>Profile
  </a>
</nav>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="js/supabase-config.js"></script>
<script src="js/toast.js"></script>
<script src="js/ui-effects.js"></script>
<script>
let selectedPlan = null, currentUser = null, userProfile = null;

(async () => {
  currentUser  = await requireAuth();
  if (!currentUser) return;
  userProfile  = await getProfile(currentUser.id);

  const { data: plans } = await sb.from('plans').select('*').eq('is_active',true).order('min_amount');
  if (!plans?.length) { document.getElementById('plans-list').innerHTML = '<div class="text-muted text-center">No plans available.</div>'; return; }

  const featIdx = 1;
  document.getElementById('plans-list').innerHTML = plans.map((plan, i) => `
    <div class="plan-card ${i===featIdx?'featured':''}" onclick='openModal(${JSON.stringify(plan).replace(/'/g,"&#39;")})'>
      ${i===featIdx ? '<div class="plan-badge">POPULAR</div>' : ''}
      <div class="plan-name">${plan.name}</div>
      <div style="margin-top:12px;">
        <div class="plan-roi">${plan.daily_roi_percent}%</div>
        <div class="plan-roi-label">Daily Return</div>
      </div>
      <div class="plan-range">$${Number(plan.min_amount).toLocaleString()} – $${Number(plan.max_amount).toLocaleString()}</div>
      <div class="plan-range" style="margin-top:4px;">${plan.duration_days}-day term · ${plan.description || ''}</div>
      <button class="btn btn-sm" style="margin-top:16px;${i===featIdx?'background:rgba(254,250,224,0.2);color:var(--text-white);border:1px solid rgba(254,250,224,0.35);':'border:1.5px solid var(--primary);color:var(--primary);background:transparent;'}">
        Invest Now
      </button>
    </div>
  `).join('');
})();

function openModal(plan) {
  selectedPlan = plan;
  document.getElementById('invest-modal').style.display = 'flex';
  document.getElementById('modal-plan-name').textContent = `Invest in ${plan.name}`;
  document.getElementById('modal-plan-info').textContent = `${plan.daily_roi_percent}% daily for ${plan.duration_days} days · Min: $${plan.min_amount} · Max: $${plan.max_amount}`;
  document.getElementById('invest-amount').value = '';
  document.getElementById('modal-daily-return').textContent = '$0.00';
  document.getElementById('modal-total-return').textContent = '$0.00';
  document.getElementById('invest-amount').oninput = (e) => {
    const amt = parseFloat(e.target.value) || 0;
    document.getElementById('modal-daily-return').textContent = formatMoney(amt * plan.daily_roi_percent / 100);
    document.getElementById('modal-total-return').textContent = formatMoney(amt * plan.daily_roi_percent / 100 * plan.duration_days);
  };
}
function closeModal() { document.getElementById('invest-modal').style.display = 'none'; }

async function confirmInvest() {
  const amount = parseFloat(document.getElementById('invest-amount').value);
  if (!amount) { Toast.show('Please enter an amount.', 'warning'); return; }
  if (amount < selectedPlan.min_amount) { Toast.show(`Minimum is $${selectedPlan.min_amount}.`, 'warning'); return; }
  if (amount > selectedPlan.max_amount) { Toast.show(`Maximum is $${selectedPlan.max_amount}.`, 'warning'); return; }
  if (amount > userProfile.balance)     { Toast.show('Insufficient balance. Deposit first.', 'error'); return; }

  const btn = document.getElementById('confirm-invest-btn');
  setLoading(btn, true, 'Processing…');

  const expiresAt = new Date(); expiresAt.setDate(expiresAt.getDate() + selectedPlan.duration_days);

  const { error: invErr } = await sb.from('investments').insert({
    user_id: currentUser.id, plan_id: selectedPlan.id,
    amount, daily_roi_percent: selectedPlan.daily_roi_percent,
    expires_at: expiresAt.toISOString()
  });
  if (invErr) { Toast.show(invErr.message, 'error'); setLoading(btn, false); return; }

  await sb.from('profiles').update({
    balance: userProfile.balance - amount,
    total_deposited: userProfile.total_deposited + amount
  }).eq('id', currentUser.id);

  Toast.show(`${formatMoney(amount)} invested in ${selectedPlan.name}!`, 'success');
  closeModal();
  setTimeout(() => window.location.href = 'dashboard.html', 1200);
}

document.getElementById('invest-modal').addEventListener('click', e => {
  if (e.target === document.getElementById('invest-modal')) closeModal();
});
</script>
</body>
</html>
